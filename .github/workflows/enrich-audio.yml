name: Enrich latest route video from audio

on:
  workflow_dispatch:
  schedule:
    - cron: "47 6,18 * * *"

permissions:
  contents: write

concurrency:
  group: wangshifu-data-write
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-audio-enrichment.txt

      - name: Check audio enrichment configuration
        shell: bash
        env:
          VOLC_ASR_API_KEY: ${{ secrets.VOLC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TRANSCRIPT_ENCRYPTION_KEY: ${{ secrets.TRANSCRIPT_ENCRYPTION_KEY }}
        run: |
          test -n "${VOLC_ASR_API_KEY:-}"
          test -n "${DEEPSEEK_API_KEY:-}"
          test -n "${TRANSCRIPT_ENCRYPTION_KEY:-}"

      - name: Install audio enrichment dependencies
        shell: bash
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          python -m pip install --upgrade pip
          python -m pip install -r requirements-audio-enrichment.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Enrich one route episode
        id: enrich
        timeout-minutes: 45
        env:
          ASR_PROVIDER: volcengine
          TEXT_AI_PROVIDER: deepseek
          VOLC_ASR_API_KEY: ${{ secrets.VOLC_API_KEY }}
          VOLC_ASR_RESOURCE_ID: volc.seedasr.auc
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DEEPSEEK_MODEL: deepseek-chat
          TRANSCRIPT_ENCRYPTION_KEY: ${{ secrets.TRANSCRIPT_ENCRYPTION_KEY }}
          TRANSCRIPT_CACHE_DIR: transcripts
          BILIBILI_COOKIES_BASE64: ${{ secrets.BILIBILI_COOKIES_BASE64 }}
          AI_LOOKBACK_EPISODES: "30"
          MAX_AI_EPISODES: "1"
        run: python scripts/enrich_latest_video.py

      - name: Validate enriched route data
        id: validate
        if: ${{ steps.enrich.outcome == 'success' }}
        run: python scripts/validate_route_data.py

      - name: Commit enriched facts and encrypted transcript
        if: ${{ steps.enrich.outcome == 'success' && steps.validate.outcome == 'success' }}
        shell: pwsh
        run: |
          git config user.name "route-update-bot"
          git config user.email "route-update-bot@users.noreply.github.com"
          git add wangshifu-data.json
          git add -A -- transcripts
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "data: enrich latest Bilibili route video"
            $pushed = $false
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              git push
              if ($LASTEXITCODE -eq 0) {
                $pushed = $true
                break
              }
              if ($attempt -lt 3) {
                Start-Sleep -Seconds (5 * $attempt)
                git pull --rebase origin main
                if ($LASTEXITCODE -ne 0) {
                  throw "Unable to synchronize main before retrying the push."
                }
              }
            }
            if (-not $pushed) {
              throw "Unable to push enriched route data after 3 attempts."
            }
          }

      - name: Preserve encrypted transcript after enrichment failure
        if: ${{ always() && (steps.enrich.outcome == 'failure' || steps.validate.outcome == 'failure') }}
        shell: pwsh
        run: |
          git config user.name "route-update-bot"
          git config user.email "route-update-bot@users.noreply.github.com"
          git restore --source=HEAD --staged --worktree -- wangshifu-data.json
          git add -A -- transcripts
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "data: cache encrypted Bilibili transcript"
            $pushed = $false
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              git push
              if ($LASTEXITCODE -eq 0) {
                $pushed = $true
                break
              }
              if ($attempt -lt 3) {
                Start-Sleep -Seconds (5 * $attempt)
                git pull --rebase origin main
                if ($LASTEXITCODE -ne 0) {
                  throw "Unable to synchronize main before retrying the transcript push."
                }
              }
            }
            if (-not $pushed) {
              throw "Unable to push encrypted transcript after 3 attempts."
            }
          }
