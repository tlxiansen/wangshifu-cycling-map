name: Rank route contributions

on:
  workflow_dispatch:
  schedule:
    - cron: "37 * * * *"

permissions:
  issues: write

jobs:
  rank:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const priority = "票选-优先";
            try {
              await github.rest.issues.getLabel({owner, repo, name: priority});
            } catch {
              await github.rest.issues.createLabel({
                owner, repo, name: priority, color: "ee642f",
                description: "获得至少 3 个赞，优先核验"
              });
            }
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: "open", labels: "route-data", per_page: 100
            });
            for (const issue of issues) {
              const reactions = await github.paginate(github.rest.reactions.listForIssue, {
                owner, repo, issue_number: issue.number, per_page: 100
              });
              const likes = reactions.filter(r => r.content === "+1").length;
              const hasPriority = issue.labels.some(l => (typeof l === "string" ? l : l.name) === priority);
              if (likes >= 3 && !hasPriority) {
                await github.rest.issues.addLabels({owner, repo, issue_number: issue.number, labels: [priority]});
              } else if (likes < 3 && hasPriority) {
                await github.rest.issues.removeLabel({owner, repo, issue_number: issue.number, name: priority});
              }
            }
