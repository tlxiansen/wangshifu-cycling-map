name: Apply accepted contribution

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

concurrency:
  group: wangshifu-data-write
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.label.name == '???'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const maintainer = "tlxiansen";
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const acceptedLabel = "???";

            if (context.actor !== maintainer) {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: issueNumber, name: acceptedLabel
                });
              } catch {}
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: `????????????? @${maintainer} ?????????????`
              });
              return;
            }

            const body = issue.body || "";
            const clean = value => {
              if (!value) return null;
              const text = value.trim();
              return !text || text === "_No response_" ? null : text;
            };
            const escapeRegExp = text => text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const headingValue = label => {
              const re = new RegExp(`###\\s+${escapeRegExp(label)}\\s*\\n+([\\s\\S]*?)(?=\\n+###\\s+|$)`);
              return clean(body.match(re)?.[1]);
            };
            const bulletValue = label => {
              const re = new RegExp(`^-\\s*${escapeRegExp(label)}[?:]\\s*(.+)$`, "m");
              return clean(body.match(re)?.[1]);
            };
            const field = (...labels) => {
              for (const label of labels) {
                const value = bulletValue(label) || headingValue(label);
                if (value) return value;
              }
              return null;
            };

            const video = field("BV?", "B?????? BV ?") || body;
            const bvid = video.match(/BV[0-9A-Za-z]+/)?.[0];
            if (!bvid) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: "??????????????? BV ????????????????? BV ??????????????"
              });
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: issueNumber, name: acceptedLabel
              });
              return;
            }

            const category = field("??", "????") || "??";
            const date = field("??", "????????");
            const finding = field("????", "???????");
            const timepoint = field("?????", "?????????");
            const place = field("?? / ??", "?????????");
            const distanceText = field("????", "????????");
            const coordinates = field("??", "???????");
            const food = field("??", "???????????");
            const evidenceText = field("????????");
            const hotelName = field("??", "?? / ????", "?? / ????????");
            const hotelArea = field("??", "????", "??????????");
            const hotelPriceText = field("??", "????", "???????????");
            const hotelBooking = field("??", "????");
            const bikeStorage = field("??", "??????");
            const hotelRecommendation = field("????");
            const hotelPros = field("??");
            const hotelCons = field("?? / ??");

            const content = await github.rest.repos.getContent({
              owner, repo, path: "wangshifu-data.json", ref: "main"
            });
            const data = JSON.parse(Buffer.from(content.data.content, "base64").toString("utf8").replace(/^\uFEFF/, ""));
            const item = data.find(entry => entry.bvid === bvid);
            if (!item) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: `??????????????????? ${bvid}????????`
              });
              return;
            }

            for (const key of ["foods", "foodDetails", "lodgings", "costs", "highlights", "evidence"]) {
              if (!Array.isArray(item[key])) item[key] = [];
            }
            if (!Array.isArray(item.riskFlags)) item.riskFlags = item.riskFlags ? [item.riskFlags] : [];
            const changes = [];
            if (date && /^\d{4}-\d{2}-\d{2}$/.test(date) && item.date !== date) {
              item.date = date;
              changes.push(`???${date}`);
            }
            if (place && item.place !== place) {
              item.place = place;
              item.confidence = `??????GitHub #${issueNumber}?`;
              changes.push(`???${place}`);
            }
            if (distanceText) {
              const distance = Number(distanceText.match(/\d+(?:\.\d+)?/)?.[0]);
              if (Number.isFinite(distance) && item.distanceKm !== distance) {
                item.distanceKm = distance;
                changes.push(`???${distance} km`);
              }
            }
            if (coordinates) {
              const nums = coordinates.match(/-?\d+(?:\.\d+)?/g)?.map(Number) || [];
              if (nums.length >= 2 && Math.abs(nums[0]) <= 90 && Math.abs(nums[1]) <= 180) {
                item.lat = nums[0];
                item.lng = nums[1];
                item.coordinateSource = `??????GitHub #${issueNumber}?`;
                item.confidence = `??????GitHub #${issueNumber}?`;
                changes.push(`???${nums[0]}, ${nums[1]}`);
              }
            }
            if (food && !item.foods.includes(food)) {
              item.foods.push(food);
              if (!item.food || item.food === "?????" || item.food === "Not identified") item.food = food;
              item.foodDetails.push({
                name: food,
                venue: "?????",
                status: `??????GitHub #${issueNumber}?`,
                source: issue.html_url
              });
              changes.push(`???${food}`);
            }

            if (hotelName || hotelArea || hotelPriceText) {
              const price = hotelPriceText ? Number(hotelPriceText.match(/\d+(?:\.\d+)?/)?.[0]) : null;
              const currency = /VND|???/i.test(hotelPriceText || "") ? "VND" : /CNY|???|?/i.test(hotelPriceText || "") ? "CNY" : null;
              const lodging = {
                name: hotelName || "???????",
                area: hotelArea || place || item.place,
                price: Number.isFinite(price) ? price : null,
                currency,
                booking: hotelBooking || "???",
                bikeStorage: bikeStorage || "???",
                pros: hotelPros || null,
                cons: hotelCons || null,
                recommendation: hotelRecommendation || "???",
                status: `??????GitHub #${issueNumber}?`,
                source: issue.html_url
              };
              if (!item.lodgings.some(entry => entry.source === issue.html_url)) {
                item.lodgings.push(lodging);
                changes.push(`???${lodging.name}`);
              }
              if (lodging.price != null && lodging.currency && !item.costs.some(entry => entry.source === issue.html_url)) {
                item.costs.push({
                  category: "??",
                  label: lodging.name,
                  amount: lodging.price,
                  currency: lodging.currency,
                  status: lodging.status,
                  source: issue.html_url
                });
              }
            }

            if (finding && (timepoint || category === "???? / ??" || category === "??????")) {
              const highlight = {
                time: timepoint || "????",
                text: finding,
                status: `??????GitHub #${issueNumber}?`,
                source: issue.html_url
              };
              if (!item.highlights.some(entry => entry.source === issue.html_url)) {
                item.highlights.push(highlight);
                changes.push(`?????${finding.slice(0, 40)}${finding.length > 40 ? "?" : ""}`);
              }
            }

            if (!item.evidence.some(entry => entry.url === issue.html_url)) {
              item.evidence.push({
                type: "github-issue",
                url: issue.html_url,
                note: finding || evidenceText || `${category}??`,
                acceptedBy: maintainer,
                acceptedAt: new Date().toISOString()
              });
              changes.push("????");
            }
            item.manualVerified = true;
            item.confidence = `??????GitHub #${issueNumber}?`;

            const updated = JSON.stringify(data, null, 2) + "\n";
            const commit = await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: "wangshifu-data.json",
              message: `data: apply accepted issue #${issueNumber}`,
              content: Buffer.from(updated, "utf8").toString("base64"),
              sha: content.data.sha,
              branch: "main"
            });

            const commitUrl = commit.data.commit.html_url;
            await github.rest.issues.createComment({
              owner, repo, issue_number: issueNumber,
              body: `? ?? @${maintainer} ??????????\n\n?????\n${changes.map(x => `- ${x}`).join("\n")}\n\n[??????](${commitUrl})?GitHub Pages ?????????????`
            });
            await github.rest.issues.update({
              owner, repo, issue_number: issueNumber, state: "closed",
              labels: issue.labels
                .map(label => typeof label === "string" ? label : label.name)
                .filter(label => label !== "???")
            });
