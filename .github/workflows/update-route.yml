name: Update Bilibili route data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: wangshifu-route-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-audio-enrichment.txt
      - name: Fetch latest public season data
        shell: pwsh
        run: ./update_wangshifu_data.ps1
      - name: Check audio enrichment configuration
        id: audio-config
        env:
          VOLC_ASR_API_KEY: ${{ secrets.VOLC_API_KEY }}
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          ARK_MODEL_ID: ${{ secrets.ARK_MODEL_ID }}
        run: |
          if [ -n "$VOLC_ASR_API_KEY" ] && [ -n "$ARK_API_KEY" ] && [ -n "$ARK_MODEL_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "### 豆包音频信息提取" >> "$GITHUB_STEP_SUMMARY"
            echo "- 尚未完整配置火山引擎凭证，本次安全跳过。" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Install audio enrichment dependencies
        if: steps.audio-config.outputs.enabled == 'true'
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          python -m pip install --upgrade pip
          python -m pip install -r requirements-audio-enrichment.txt
      - name: Enrich newest video from audio
        if: steps.audio-config.outputs.enabled == 'true'
        continue-on-error: true
        env:
          ASR_PROVIDER: volcengine
          TEXT_AI_PROVIDER: volcengine
          VOLC_ASR_API_KEY: ${{ secrets.VOLC_API_KEY }}
          VOLC_ASR_RESOURCE_ID: volc.seedasr.auc
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          ARK_MODEL_ID: ${{ secrets.ARK_MODEL_ID }}
          BILIBILI_COOKIES_BASE64: ${{ secrets.BILIBILI_COOKIES_BASE64 }}
          AI_LOOKBACK_EPISODES: "30"
          MAX_AI_EPISODES: "3"
        run: python scripts/enrich_latest_video.py
      - name: Collect high-like public comment candidates
        shell: pwsh
        continue-on-error: true
        run: ./collect_bilibili_candidates.ps1
      - name: Create GitHub Issues from new comment candidates
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const rawCandidates = JSON.parse(fs.readFileSync("bilibili-candidates.json", "utf8").replace(/^\uFEFF/, "")).items || [];
            const isRelevant = message => /路线图|路线|路书|骑行|地址|位置|友谊关|友誼關|凭祥|口岸|海关|起点|终点|出发|到达|公里|里程|\bKM\b|酒店|住宿|入住|民宿|旅馆|宾馆|Hotel|早餐|午餐|晚餐|餐厅|餐馆|小吃|猪杂粉|海鲜|烤肉|烧烤|咖啡店|茶馆|\d+(?:\.\d+)?\s*(?:元|人民币|CNY|万?越南盾|VND)/i.test(message || "");
            const candidates = rawCandidates.filter(candidate => Number(candidate.likes || 0) >= 10 && isRelevant(candidate.message));
            const maxNewPerRun = 10;
            const labels = [
              {name: "route-data", color: "16806c", description: "路线、里程、饮食、住宿等数据建议"},
              {name: "待核验", color: "d4a72c", description: "尚未由维护者核对视频内容"},
              {name: "auto-bilibili", color: "6f42c1", description: "由B站公开高赞评论自动生成"}
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({owner, repo, name: label.name});
              } catch {
                await github.rest.issues.createLabel({owner, repo, ...label});
              }
            }

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: "all", labels: "auto-bilibili", per_page: 100
            });
            const knownRpids = new Set();
            for (const issue of existing) {
              const match = (issue.body || "").match(/<!--\s*bili-rpid:(\d+)\s*-->/);
              if (match) knownRpids.add(match[1]);
            }

            const categoryFor = message => {
              if (/酒店|住宿|入住|民宿|旅馆|宾馆|Hotel/i.test(message)) return "住宿";
              if (/公里|里程|\bKM\b/i.test(message)) return "当天里程";
              if (/吃|早餐|午餐|晚餐|粉|饭|餐厅|餐馆|小吃|水果|茶|咖啡|烧烤|烤肉|海鲜/i.test(message)) return "美食";
              if (/起点|终点|出发|到达|口岸|海关|路线|路书|位置|地点|城市|村|县|省/i.test(message)) return "地点 / 路线";
              return "关键内容 / 事件";
            };
            const distanceFor = message => {
              const match = message.match(/(\d+(?:\.\d+)?)\s*(?:KM|公里)/i);
              return match ? `${match[1]} km` : "_No response_";
            };
            const hotelFor = message => {
              const match = message.match(/(?:酒店为|入住(?:的|了)?|住的酒店(?:是|为)?|名称[：:]?)\s*([A-Za-zÀ-ỹ\u4e00-\u9fff][A-Za-zÀ-ỹ\u4e00-\u9fff\s·.'-]{1,32}(?:Hotel|酒店|宾馆|旅馆|民宿))/i)
                || message.match(/([A-Za-zÀ-ỹ\u4e00-\u9fff][A-Za-zÀ-ỹ\u4e00-\u9fff\s·.'-]{1,24}(?:Hotel|酒店|宾馆|旅馆|民宿))/i);
              return match ? match[1].trim() : "_No response_";
            };
            const hotelPriceFor = message => {
              const match = message.match(/(\d+(?:\.\d+)?)\s*(CNY|人民币|元|万?越南盾|VND)/i);
              return match ? `${match[1]} ${match[2]}` : "_No response_";
            };
            const short = (text, max = 46) => text.length > max ? `${text.slice(0, max)}…` : text;
            let created = 0;
            for (const candidate of candidates) {
              const rpid = String(candidate.rpid || "");
              if (!rpid || knownRpids.has(rpid) || created >= maxNewPerRun) continue;
              const category = categoryFor(candidate.message || "");
              const issueBody = [
                "> 此建议由系统从公开视频下方的高赞评论自动整理。请维护者核对视频后再添加“已采纳”；需要时可先编辑本 Issue，补全结构化字段。",
                "",
                "### B站视频链接或 BV 号",
                "",
                `https://www.bilibili.com/video/${candidate.bvid}/`,
                "",
                "### 内容类型",
                "",
                category,
                "",
                "### 视频日期（可选）",
                "",
                candidate.date || "_No response_",
                "",
                "### 你发现了什么？",
                "",
                candidate.message || "_No response_",
                "",
                "### 视频时间点（可选）",
                "",
                "_No response_",
                "",
                "### 地点或路段（可选）",
                "",
                "_No response_",
                "",
                "### 当天里程（如有）",
                "",
                distanceFor(candidate.message || ""),
                "",
                "### 经纬度（如有）",
                "",
                "_No response_",
                "",
                "### 视频里吃了什么（如有）",
                "",
                "_No response_",
                "",
                "### 酒店 / 民宿名称（如有）",
                "",
                category === "住宿" ? hotelFor(candidate.message || "") : "_No response_",
                "",
                "### 住宿所在区域（如有）",
                "",
                category === "住宿" ? (candidate.place || "_No response_") : "_No response_",
                "",
                "### 住宿价格与币种（如有）",
                "",
                category === "住宿" ? hotelPriceFor(candidate.message || "") : "_No response_",
                "",
                "### 更多依据（可选）",
                "",
                `B站评论作者：${candidate.user || "未知"}\n\nB站点赞：${candidate.likes || 0}\n\n原评论：${candidate.url}`,
                "",
                `<!-- bili-rpid:${rpid} -->`
              ].join("\n");
              await github.rest.issues.create({
                owner,
                repo,
                title: `[B站评论 👍${candidate.likes || 0}] ${candidate.date || ""} · ${short(candidate.message || candidate.bvid)}`,
                body: issueBody,
                labels: ["route-data", "待核验", "auto-bilibili"]
              });
              knownRpids.add(rpid);
              created++;
            }
            core.info(`Created ${created} new Issue(s) from ${candidates.length} candidate(s).`);
      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "route-update-bot"
          git config user.email "route-update-bot@users.noreply.github.com"
          git add wangshifu-data.json bilibili-candidates.json
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "data: update Bilibili route and audio insights"
            git pull --rebase origin main
            git push
          }
