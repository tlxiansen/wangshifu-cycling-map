name: Update Bilibili route data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: wangshifu-data-write
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-audio-enrichment.txt

      - name: Fetch latest Bilibili route data
        shell: pwsh
        run: ./update_wangshifu_data.ps1

      - name: Validate route data before publishing
        run: python scripts/validate_route_data.py

      - name: Commit route data before optional enrichment
        shell: pwsh
        run: |
          git config user.name "route-update-bot"
          git config user.email "route-update-bot@users.noreply.github.com"
          git add wangshifu-data.json
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "data: update Bilibili route"
            git pull --rebase origin main
            git push
          }

      - name: Collect high-like public comment candidates
        shell: pwsh
        continue-on-error: true
        run: ./collect_bilibili_candidates.ps1

      - name: Create GitHub Issues from new comment candidates
        uses: actions/github-script@v7
        with:
          script: |
            const { run } = require("./scripts/create_bilibili_issues.js");
            await run({ github, context, core });

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "route-update-bot"
          git config user.email "route-update-bot@users.noreply.github.com"
          git add wangshifu-data.json bilibili-candidates.json
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "data: update Bilibili comment candidates"
            git pull --rebase origin main
            git push
          }
